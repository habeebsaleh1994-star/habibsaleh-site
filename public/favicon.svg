<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- A frame in 3:2 — a photograph reduced to its edge, and the one mark that
       says what the site is rather than only that it is spare.

       Drawn as four bars rather than a stroked rect: a stroke is centred on the
       path, so at 16px it half-rounds inward and half outward and the corners
       thicken. Explicit bars land on whole pixels and keep the corners square.

       Inverted in a dark tab bar so it reads either way. -->
  <g class="mark">
    <rect x="10" y="26" width="108" height="12" />
    <rect x="10" y="90" width="108" height="12" />
    <rect x="10" y="26" width="12" height="76" />
    <rect x="106" y="26" width="12" height="76" />
  </g>
  <style>
    .mark rect { fill: #2a2724; }
    @media (prefers-color-scheme: dark) {
      .mark rect { fill: #fbfaf6; }
    }
  </style>
</svg>
