<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- A serif H, drawn as paths rather than <text> so it renders identically
       whether or not Georgia is installed on the reader's machine. Ink on paper,
       inverted in a dark tab bar so it reads either way. -->
  <!-- Scaled about the centre so the letter fills the tile: at 16px a mark that
       only covers half the canvas reads as a speck. -->
  <g class="mark" transform="translate(64 64) scale(1.5) translate(-64 -64)">
    <rect x="39" y="32" width="13" height="64" />
    <rect x="76" y="32" width="13" height="64" />
    <rect x="52" y="58" width="24" height="12" />
    <rect x="31" y="32" width="29" height="7" />
    <rect x="68" y="32" width="29" height="7" />
    <rect x="31" y="89" width="29" height="7" />
    <rect x="68" y="89" width="29" height="7" />
  </g>
  <style>
    .mark rect { fill: #2a2724; }
    @media (prefers-color-scheme: dark) {
      .mark rect { fill: #fbfaf6; }
    }
  </style>
</svg>
